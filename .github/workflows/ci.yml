name: CI

# Runs the host-runnable (non-integration) test suite, a dependency
# vulnerability scan, and the frontend build on every push and PR.
# Heavy CV/ML integration tests (cv2/mediapipe/scenedetect) run in Docker
# and are intentionally excluded here (`-m "not integration"`).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (editable) + test/audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pip-audit

      - name: Run host test suite (excludes integration)
        run: pytest -m "not integration" -q

      # Audit the declared dependencies for known CVEs. Non-blocking for now
      # (|| true) so a freshly-disclosed CVE doesn't wedge unrelated PRs;
      # drop the `|| true` once the dependency set is on a lock file.
      - name: Dependency vulnerability scan (full pinned tree)
        run: pip-audit -r requirements.lock --desc || true

  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build
