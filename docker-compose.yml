# ClippyMe Docker Compose
#
# CPU / Apple Silicon / ARM (default):
#   docker compose up --build
#
# NVIDIA GPU:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build

name: clippyme

networks:
  clippyme-net:
    driver: bridge

services:
  backend:
    build:
      context: .
      args:
        GPU_RUNTIME: ${GPU_RUNTIME:-cpu}
    container_name: clippyme-backend
    image: clippyme-backend
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - .:/app
      - /app/__pycache__
      - ./data:/app/data
    networks:
      - clippyme-net
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: clippyme-frontend
    image: clippyme-frontend
    ports:
      - "5175:5175"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    networks:
      - clippyme-net
    restart: unless-stopped
    depends_on:
      - backend
